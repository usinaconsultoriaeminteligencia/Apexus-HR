[tool:pytest]
# Configuração do pytest para o projeto Apexus HR

# Diretórios de teste
testpaths = tests

# Padrões de arquivos de teste
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Marcadores personalizados
markers =
    unit: marca testes unitários rápidos
    integration: marca testes de integração
    e2e: marca testes end-to-end
    slow: marca testes que demoram mais de 1 segundo
    security: marca testes de segurança
    performance: marca testes de performance
    smoke: marca testes de smoke (básicos)
    regression: marca testes de regressão
    api: marca testes de API
    database: marca testes que usam banco de dados
    redis: marca testes que usam Redis
    openai: marca testes que usam API OpenAI

# Opções padrão
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --durations=10
    --maxfail=5
    --disable-warnings

# Configurações de cobertura
[coverage:run]
source = src
omit = 
    */tests/*
    */migrations/*
    */venv/*
    */env/*
    */__pycache__/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

# Configurações de logging durante testes
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filtros de warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

# Configuração para testes paralelos
[tool:pytest-xdist]
# Número de workers para testes paralelos (auto detecta CPUs)
# Use: pytest -n auto
workers = auto

# Configuração de timeout para testes
timeout = 300  # 5 minutos por teste

# Variáveis de ambiente para testes
env =
    TESTING = true
    ENVIRONMENT = test
    DATABASE_URL = sqlite:///test.db
    REDIS_URL = redis://localhost:6379/1
    LOG_LEVEL = ERROR
    JWT_SECRET_KEY = test-secret-key
    OPENAI_API_KEY = test-openai-key

