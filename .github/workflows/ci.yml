name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rh_project/Recursos-Humanos-PRODUCTION-READY
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit

      - name: Run security scan (Safety)
        run: |
          cd backend
          safety check --full-report || true

      - name: Run static analysis (Bandit)
        run: |
          cd backend
          bandit -r src -ll || true

      - name: Run backend tests
        run: |
          cd backend
          pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend lint and tests
        run: |
          cd frontend
          npm run lint --if-present
          npm run test --if-present

      - name: Build frontend
        run: |
          cd frontend
          npm run build --if-present

      - name: Build Docker images (no push)
        if: always()
        run: |
          docker build -t rh-backend ./backend -f backend/Dockerfile.production
          docker build -t rh-frontend ./frontend
