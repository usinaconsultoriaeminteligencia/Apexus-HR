name: CI — Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          TESTING: "true"
          SECRET_KEY: "ci-secret-key-not-real"
          JWT_SECRET_KEY: "ci-jwt-secret-key-not-real"
          OPENAI_API_KEY: "sk-not-real-ci-key"
          ENVIRONMENT: "development"
        run: |
          mkdir -p reports
          pytest tests/ -q --tb=short \
            --junitxml=reports/junit.xml \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: backend/reports/
          retention-days: 7

  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    continue-on-error: true  # informativo até o código ser formatado

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dev dependencies
        run: pip install flake8 black isort

      - name: black (check only)
        run: black --check --diff src/ tests/

      - name: flake8
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503

      - name: isort (check only)
        run: isort --check-only --diff src/ tests/
