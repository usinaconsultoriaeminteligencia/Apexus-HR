# Docker Compose para desenvolvimento local - Apexus HR
# Use este arquivo para testar a plataforma localmente

services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: apexus_hr_db_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apexus_hr}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - apexus_hr_network

  # Redis para cache
  redis:
    image: redis:7-alpine
    container_name: apexus_hr_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apexus_hr_network

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  apexus_hr_network:
    driver: bridge
